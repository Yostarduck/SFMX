version: 1.0.{build}

# Only build pull requests, skip duplicate branch builds
skip_branch_with_pr: true

image:
  - Visual Studio 2022
  - Ubuntu

platform: x64

configuration:
  - Debug
  - Release

cache:
  - Build/_deps/sfml-src -> SketchGfx/CMakeLists.txt
  - Build/_deps/sfml-build -> SketchGfx/CMakeLists.txt

install:
  - cmake --version
  
# Webhook sent via on_finish build scripts (not the notifications provider)
# because Appveyor's .NET client rejects Content-Type as a request header,
# and Discord requires Content-Type: application/json.

#
# ── Windows ──────────────────────────────────────────────────────────
#
for:
-
  matrix:
    only:
      - image: Visual Studio 2022

  build_script:
    - cmake -B Build -A x64
    - cmake --build Build --config %CONFIGURATION%

  after_build:
    - ps: |
        $libDir = "Build\_deps\sfml-build\lib\$env:CONFIGURATION"
        $binDir = "Build\_deps\sfml-build\bin"
        $outDir = "Build\x64\$env:CONFIGURATION"
        if (Test-Path $libDir) { Copy-Item "$libDir\*.dll" $outDir }
        if (Test-Path $binDir) { Copy-Item "$binDir\*.dll" $outDir }

  test_script:
    - ps: |
        $raw = ctest --test-dir Build -C $env:CONFIGURATION --output-on-failure --timeout 30 2>&1
        $output = $raw | Out-String
        Write-Host $output
        $match = [regex]::Match($output, '(\d+)% tests passed, (\d+) tests failed out of (\d+)')
        if ($match.Success) {
          $pct = $match.Groups[1].Value
          $fail = $match.Groups[2].Value
          $total = $match.Groups[3].Value
          "$pct% ($total total, $fail failed)" | Out-File -FilePath test_summary.txt -Encoding utf8
        } else {
          "No tests found" | Out-File -FilePath test_summary.txt -Encoding utf8
        }
        # Note: test exit code is NOT propagated so build status stays green;
        # the "Tests" field in the webhook reflects the actual result.

  on_finish:
    - ps: |
        $url = "$env:WEBHOOK_URL"
        $status = "$env:APPVEYOR_JOB_STATUS"
        $failed = ($status -like "*fail*")
        $color = if ($failed) { 16711680 } else { 65280 }
        $title = if ($failed) { "Build failed" } else { "Build passed" }
        $testStatus = if (Test-Path test_summary.txt) { (Get-Content test_summary.txt -Raw).Trim() } else { "Not run" }
        $commitMsg = "$env:APPVEYOR_REPO_COMMIT_MESSAGE".Split("`n")[0]
        $buildUrl = "$env:APPVEYOR_URL/project/$env:APPVEYOR_ACCOUNT_NAME/$env:APPVEYOR_PROJECT_SLUG/build/$env:APPVEYOR_BUILD_VERSION"
        $shortSha = "$env:APPVEYOR_REPO_COMMIT".Substring(0, [Math]::Min(7, "$env:APPVEYOR_REPO_COMMIT".Length))
        $body = @{
          embeds = @(@{
            title = $title
            url = $buildUrl
            color = $color
            fields = @(
              @{ name = "Project"; value = $env:APPVEYOR_PROJECT_NAME;       inline = $true }
              @{ name = "Branch";  value = $env:APPVEYOR_REPO_BRANCH;        inline = $true }
              @{ name = "OS";      value = "$env:APPVEYOR_BUILD_WORKER_IMAGE"; inline = $true }
              @{ name = "Config";  value = "$env:CONFIGURATION";              inline = $true }
              @{ name = "Commit";  value = $shortSha;                        inline = $true }
              @{ name = "Tests";   value = $testStatus;                      inline = $true }
              @{ name = "Message"; value = $commitMsg;                       inline = $false }
            )
            footer = @{ text = "Build $env:APPVEYOR_BUILD_VERSION" }
          })
        } | ConvertTo-Json -Compress -Depth 4
        Invoke-RestMethod -Uri $url -Method Post -Body $body -ContentType "application/json"

  artifacts:
    - path: Build\x64\%CONFIGURATION%\Game.exe
      name: Game-%CONFIGURATION%
    - path: Build\x64\%CONFIGURATION%\*.dll
      name: RuntimeDLLs-%CONFIGURATION%

#
# ── Linux ────────────────────────────────────────────────────────────
#
-
  matrix:
    only:
      - image: Ubuntu

  before_build:
    - sh: sudo apt-get update -qq && sudo apt-get install -y -qq libudev-dev libvorbis-dev libogg-dev libflac-dev libmbedtls-dev libssh2-1-dev

  build_script:
    - cmake -B Build
    - cmake --build Build --config $CONFIGURATION

  after_build:
    - sh: |
        LIBDIR="Build/_deps/sfml-build/lib"
        OUTDIR="Build/x64/$CONFIGURATION"
        if [ -d "$LIBDIR" ]; then
          mkdir -p "$OUTDIR"
          cp "$LIBDIR"/libsfml-*.so* "$OUTDIR" 2>/dev/null || true
        fi

  test_script:
    - sh: |
        export LD_LIBRARY_PATH="Build/_deps/sfml-build/lib:Build/x64/$CONFIGURATION"
        output=$(ctest --test-dir Build -C $CONFIGURATION --output-on-failure --timeout 30 2>&1) || true
        echo "$output"
        summary=$(echo "$output" | grep -oP '\d+% tests passed, \d+ tests failed out of \d+' | tail -1)
        if [ -n "$summary" ]; then
          echo "$summary" > test_summary.txt
        else
          echo "No tests found" > test_summary.txt
        fi

  on_finish:
    - sh: |
        URL="$WEBHOOK_URL"
        BUILD_URL="$APPVEYOR_URL/project/$APPVEYOR_ACCOUNT_NAME/$APPVEYOR_PROJECT_SLUG/build/$APPVEYOR_BUILD_VERSION"
        SHORT_SHA=$(printf '%.7s' "$APPVEYOR_REPO_COMMIT")
        TEST_STATUS=$(cat test_summary.txt 2>/dev/null || echo "Not run")
        export URL APPVEYOR_JOB_STATUS APPVEYOR_PROJECT_NAME APPVEYOR_REPO_BRANCH APPVEYOR_BUILD_VERSION APPVEYOR_REPO_COMMIT_MESSAGE BUILD_URL SHORT_SHA TEST_STATUS
        python3 -c "import json,os;failed='fail' in os.environ['APPVEYOR_JOB_STATUS'].lower();c=16711680 if failed else 65280;title='Build failed' if failed else 'Build passed';url=os.environ['URL'];msg=(os.environ.get('APPVEYOR_REPO_COMMIT_MESSAGE','') or '').split('\n')[0];build_url=os.environ['BUILD_URL'];project=os.environ['APPVEYOR_PROJECT_NAME'];branch=os.environ['APPVEYOR_REPO_BRANCH'];image=os.environ.get('APPVEYOR_BUILD_WORKER_IMAGE','');cfg=os.environ.get('CONFIGURATION','');sha=os.environ['SHORT_SHA'];version=os.environ['APPVEYOR_BUILD_VERSION'];tests=os.environ.get('TEST_STATUS','Not run');body=json.dumps({'embeds':[{'title':title,'url':build_url,'color':c,'fields':[{'name':'Project','value':project,'inline':True},{'name':'Branch','value':branch,'inline':True},{'name':'OS','value':image,'inline':True},{'name':'Config','value':cfg,'inline':True},{'name':'Commit','value':sha,'inline':True},{'name':'Tests','value':tests,'inline':True},{'name':'Message','value':msg,'inline':False}],'footer':{'text':'Build '+version}}]});import urllib.request as r;r.urlopen(r.Request(url,data=body.encode(),headers={'Content-Type':'application/json'},method='POST'))" 2>/dev/null || true

  artifacts:
    - path: Build/x64/$(CONFIGURATION)/Game
      name: Game-$(CONFIGURATION)
